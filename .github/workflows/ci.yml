# ZeroSpider — minimal CI (migration plan Phase 0: ai-protocol graph must compile).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check (ai-protocol feature)
        run: cargo check --workspace --features ai-protocol

      - name: cargo check (ai-protocol + routing_mvp — compile gate)
        run: cargo check -p zerospider --features "ai-protocol routing_mvp" --lib

      - name: cargo test (ai-protocol feature)
        run: cargo test --workspace --features ai-protocol

      - name: cargo test (ai-protocol + legacy — factory + provider_resolution)
        run: cargo test -p zerospider --features "ai-protocol legacy-providers"

      - name: cargo check (protocol-only, no legacy providers)
        run: cargo check -p zerospider --no-default-features --features ai-protocol --lib
